    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --accent: #dc2626;
            --success: #16a34a;
            --dark: #1f2937;
            --light: #f8fafc;
            --gray: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: var(--light);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .header-actions {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .search-box {
            padding: 8px 16px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1rem;
        }

        .cart-icon {
            position: relative;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .cart-icon:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Hero Product */
        .hero-product {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .hero-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 16px;
        }

        .hero-content h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .hero-price {
            font-size: 2rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .filter-btn.active,
        .filter-btn:hover {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--success);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .old-price {
            font-size: 1rem;
            color: var(--gray);
            text-decoration: line-through;
            margin-left: 8px;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 1rem;
        }

        .stars {
            color: #fbbf24;
            font-size: 0.9rem;
        }

        .category-tag {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-product {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .filters {
                justify-content: center;
            }

            .search-box {
                width: 100%;
                max-width: 250px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
            }
        }

        /* Loading Animation */
        .loading {
            display: flex;
            justify-content: center;
            padding: 4rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        const productsGrid = document.getElementById("productsGrid");
        const searchBox = document.getElementById("searchBox");

let currentCategory = "all";

// DISPLAY PRODUCTS
function displayProducts(list) {
    productsGrid.innerHTML = "";

    if (list.length === 0) {
        productsGrid.innerHTML = "<h2>No products found 😢</h2>";
        return;
    }

    list.forEach(product => {
        const div = document.createElement("div");
        div.classList.add("product-card");

        div.innerHTML = `
            <img src="${product.image}" class="product-image">
            <h3>${product.name}</h3>
            <p>₹${product.price}</p>
        `;

        productsGrid.appendChild(div);
    });
}

// FILTER LOGIC
function filterProducts() {
    let value = searchBox.value.toLowerCase();

    let filtered = products.filter(p => {
        let matchCategory = currentCategory === "all" || p.category === currentCategory;
        let matchSearch = p.name.toLowerCase().includes(value);

        return matchCategory && matchSearch;
    });

    displayProducts(filtered);
}

// SEARCH EVENT
searchBox.addEventListener("input", filterProducts);

// CATEGORY BUTTONS
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        currentCategory = btn.dataset.category;

        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("bg-blue-600","text-white"));
        btn.classList.add("bg-blue-600","text-white");

        filterProducts();
    });
});

// INITIAL LOAD
displayProducts(products);

    </script>
